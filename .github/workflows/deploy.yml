# Build e deploy automatico del sito Astro su GitHub Pages.
# Trigger: push su main, oppure run manuale dal tab Actions.
# Il sito è servito da masoninnovation.it (custom domain via public/CNAME).
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Una sola istanza di deploy per volta — code stale buttate via.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    # Solo il repo che ospita GitHub Pages (giovannimason.com → masoninnovation.it)
    # deve deployare. Sul mirror "origin" (biblio-treviso) Pages non è abilitato: qui
    # il workflow si salta da solo (skipped) invece di fallire sul passo di deploy.
    if: github.repository == 'Icaica14/giovannimason.com'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build with Astro
        run: npx astro build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
