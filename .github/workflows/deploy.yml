# Build e deploy automatico del sito Astro su GitHub Pages.
# Trigger: push su main, oppure run manuale dal tab Actions.
# Il sito è servito da masoninnovation.it (custom domain via public/CNAME).
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  # Rebuild on-demand quando il proprietario pubblica contenuti dalla dashboard
  # /gestione: un DB webhook Supabase → Edge Function trigger-rebuild → questo
  # evento (POST /repos/.../dispatches con event_type: content-changed).
  repository_dispatch:
    types: [content-changed]

permissions:
  contents: read
  pages: write
  id-token: write

# Una sola istanza di deploy per volta — code stale buttate via.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    # Solo il repo che ospita GitHub Pages (giovannimason.com → masoninnovation.it)
    # deve deployare. Sul mirror "origin" (biblio-treviso) Pages non è abilitato: qui
    # il workflow si salta da solo (skipped) invece di fallire sul passo di deploy.
    if: github.repository == 'Icaica14/giovannimason.com'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Rileva se TinaCloud è configurato (segreti presenti) senza stamparne il valore.
      # Finché non lo è, il sito si pubblica comunque: cambia solo che /admin non c'è ancora.
      - name: Detect TinaCloud config
        id: tina
        env:
          TINA_PUBLIC_CLIENT_ID: ${{ secrets.TINA_PUBLIC_CLIENT_ID }}
          TINA_TOKEN: ${{ secrets.TINA_TOKEN }}
        run: |
          if [ -n "$TINA_PUBLIC_CLIENT_ID" ] && [ -n "$TINA_TOKEN" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::TinaCloud non configurato — pubblico il sito senza /admin. Aggiungi i segreti TINA_PUBLIC_CLIENT_ID e TINA_TOKEN per attivare l'area riservata."
          fi

      # Compila la SPA dell'area riservata in public/admin/ (servita poi da Astro).
      # Deve girare PRIMA di astro build, così public/admin finisce in dist/.
      - name: Build admin (TinaCMS)
        if: steps.tina.outputs.configured == 'true'
        env:
          TINA_PUBLIC_CLIENT_ID: ${{ secrets.TINA_PUBLIC_CLIENT_ID }}
          TINA_TOKEN: ${{ secrets.TINA_TOKEN }}
        run: npx tinacms build

      - name: Build with Astro
        # Config Supabase pubblica (la anon key è pubblica per design: il confine di
        # sicurezza è la RLS). Serve sia al fetch a build-time (eventi/menu) sia al
        # bundle della dashboard /gestione. Tenuta tra i *Secrets* del repo (va bene:
        # valori pubblici, semplicemente mascherati nei log). Se assenti, il sito
        # builda comunque col fallback ai contenuti del repo.
        env:
          PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL }}
          PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PUBLIC_SUPABASE_ANON_KEY }}
        run: npx astro build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
